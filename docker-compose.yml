version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vanna-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vanna_demo_password
      POSTGRES_DB: vanna_demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vanna-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vanna-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vanna-network

volumes:
  postgres_data:

networks:
  vanna-network:
    driver: bridge

